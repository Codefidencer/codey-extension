<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer border frame -->
  <rect x="22" y="22" width="456" height="456" rx="64" ry="64"
        fill="none" stroke="#00E5FF" stroke-width="3" filter="url(#glow)"/>

  <!-- Antenna -->
  <line x1="250" y1="72" x2="250" y2="48" stroke="#00E5FF" stroke-width="3" filter="url(#glow)"/>
  <circle cx="250" cy="42" r="7" fill="#00E5FF" filter="url(#glow)"/>

  <!-- Robot head -->
  <rect x="120" y="72" width="260" height="185" rx="22" ry="22"
        fill="none" stroke="#00E5FF" stroke-width="3" filter="url(#glow)"/>

  <!-- Ear left -->
  <rect x="96" y="128" width="24" height="36" rx="6" ry="6"
        fill="none" stroke="#00E5FF" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Ear right -->
  <rect x="380" y="128" width="24" height="36" rx="6" ry="6"
        fill="none" stroke="#00E5FF" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Eye left outer -->
  <circle cx="193" cy="152" r="38" fill="none" stroke="#00E5FF" stroke-width="2.5" filter="url(#glow)"/>
  <!-- Eye left inner -->
  <circle cx="193" cy="152" r="20" fill="#00E5FF" filter="url(#glow)"/>

  <!-- Eye right outer -->
  <circle cx="307" cy="152" r="38" fill="none" stroke="#00E5FF" stroke-width="2.5" filter="url(#glow)"/>
  <!-- Eye right inner -->
  <circle cx="307" cy="152" r="20" fill="#00E5FF" filter="url(#glow)"/>

  <!-- Mouth lines -->
  <line x1="158" y1="218" x2="342" y2="218" stroke="#00E5FF" stroke-width="2.5" filter="url(#glow)"/>
  <line x1="172" y1="230" x2="328" y2="230" stroke="#00E5FF" stroke-width="2" filter="url(#glow)"/>

  <!-- Neck -->
  <rect x="216" y="257" width="68" height="20" rx="6" ry="6"
        fill="none" stroke="#00E5FF" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Body -->
  <rect x="136" y="277" width="228" height="116" rx="16" ry="16"
        fill="none" stroke="#00E5FF" stroke-width="3" filter="url(#glow)"/>

  <!-- Arm left -->
  <rect x="82" y="288" width="54" height="28" rx="9" ry="9"
        fill="none" stroke="#00E5FF" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Arm right -->
  <rect x="364" y="288" width="54" height="28" rx="9" ry="9"
        fill="none" stroke="#00E5FF" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Body code text -->
  <text x="250" y="326" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="28" font-weight="bold"
        fill="#00E5FF" filter="url(#glow)">&lt;/&gt;</text>
  <text x="250" y="360" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="22" font-weight="bold"
        fill="#00E5FF" filter="url(#glow)">C#</text>

  <!-- Title -->
  <text x="250" y="430" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="40" font-weight="bold" letter-spacing="2"
        fill="#00E5FF" filter="url(#glow)">Codey C#</text>
  <text x="250" y="468" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="24" letter-spacing="4"
        fill="#00E5FF" filter="url(#glow)">TUTOR</text>
</svg>
