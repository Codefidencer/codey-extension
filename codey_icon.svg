<svg width="500" height="500" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
  <title>Codey C# Tutor logo</title>
  <desc>Robot professor for coding, square format</desc>

  <!-- Square card -->
  <rect x="90" y="90" width="500" height="500" rx="60" fill="#1e1e2e" stroke="#e2e8f0" stroke-width="3"/>

  <!-- BODY / TORSO -->
  <rect x="248" y="390" width="184" height="96" rx="12" fill="#2d2d44" stroke="#e2e8f0" stroke-width="2"/>
  <rect x="264" y="402" width="152" height="72" rx="8" fill="#1a1a2e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="340" y="432" font-family="monospace" font-size="26" font-weight="bold" fill="#ffffff" text-anchor="middle">&lt;/&gt;</text>
  <text x="340" y="460" font-family="monospace" font-size="16" fill="#a78bfa" text-anchor="middle">C#</text>

  <!-- ARMS -->
  <rect x="196" y="396" width="54" height="20" rx="9" fill="#2d2d44" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="430" y="396" width="54" height="20" rx="9" fill="#2d2d44" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- NECK -->
  <rect x="314" y="372" width="52" height="22" rx="4" fill="#2d2d44" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- BOWTIE -->
  <polygon points="302,382 320,389 302,396" fill="#a78bfa"/>
  <polygon points="378,382 360,389 378,396" fill="#a78bfa"/>
  <circle cx="340" cy="389" r="6" fill="#7c3aed"/>

  <!-- ROBOT HEAD -->
  <rect x="218" y="178" width="244" height="196" rx="18" fill="#2d2d44" stroke="#e2e8f0" stroke-width="2.5"/>

  <!-- Ears -->
  <rect x="196" y="212" width="24" height="40" rx="6" fill="#2d2d44" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="460" y="212" width="24" height="40" rx="6" fill="#2d2d44" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="200" y="220" width="14" height="8" rx="3" fill="#a78bfa" opacity="0.9"/>
  <rect x="464" y="220" width="14" height="8" rx="3" fill="#a78bfa" opacity="0.9"/>

  <!-- GLASSES -->
  <circle cx="302" cy="256" r="32" fill="#1a1a2e" stroke="#e2e8f0" stroke-width="2.5"/>
  <circle cx="378" cy="256" r="32" fill="#1a1a2e" stroke="#e2e8f0" stroke-width="2.5"/>
  <line x1="334" y1="256" x2="346" y2="256" stroke="#e2e8f0" stroke-width="2.5"/>
  <line x1="218" y1="246" x2="270" y2="250" stroke="#e2e8f0" stroke-width="2"/>
  <line x1="462" y1="246" x2="410" y2="250" stroke="#e2e8f0" stroke-width="2"/>
  <circle cx="302" cy="256" r="19" fill="#a78bfa" opacity="0.9"/>
  <circle cx="378" cy="256" r="19" fill="#a78bfa" opacity="0.9"/>
  <circle cx="294" cy="248" r="6" fill="white" opacity="0.4"/>
  <circle cx="370" cy="248" r="6" fill="white" opacity="0.4"/>

  <!-- Mouth grill -->
  <line x1="236" y1="322" x2="444" y2="322" stroke="#e2e8f0" stroke-width="1.8" opacity="0.8"/>
  <line x1="236" y1="333" x2="444" y2="333" stroke="#e2e8f0" stroke-width="1.8" opacity="0.5"/>
  <line x1="236" y1="344" x2="444" y2="344" stroke="#e2e8f0" stroke-width="1.8" opacity="0.3"/>
  <line x1="270" y1="318" x2="270" y2="348" stroke="#e2e8f0" stroke-width="1" opacity="0.4"/>
  <line x1="340" y1="318" x2="340" y2="348" stroke="#e2e8f0" stroke-width="1" opacity="0.4"/>
  <line x1="410" y1="318" x2="410" y2="348" stroke="#e2e8f0" stroke-width="1" opacity="0.4"/>

  <!-- Text -->
  <text x="340" y="516" font-family="monospace" font-size="34" font-weight="bold" fill="#ffffff" text-anchor="middle">Codey C#</text>
  <text x="340" y="548" font-family="monospace" font-size="22" fill="#a78bfa" text-anchor="middle">Tutor</text>
</svg>
